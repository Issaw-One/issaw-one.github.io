<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signaler un lien mort - Paf-Links</title>
    <style>
        :root {
            --primary-color: #8A56FF;
            --bg-color: #1c1c1c;
            --text-color: #ffffff;
            --card-bg: #2a2a2a;
            --button-color: #8A56FF;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        header {
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        
        .site-title {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }
        
        .site-title span {
            color: var(--primary-color);
        }
        
        .theme-toggle {
            background-color: #333;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 10px;
        }
        
        h1::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 120px;
            height: 4px;
            background-color: var(--primary-color);
        }
        
        .form-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #3a3a3a;
            color: var(--text-color);
            font-size: 16px;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background-color: var(--button-color);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #7145e0;
        }
        
        .nav-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background-color: var(--bg-color);
            padding: 20px;
            transition: right 0.3s;
            z-index: 100;
            overflow-y: auto;
        }
        
        .menu-open {
            right: 0;
        }
        
        .menu-section {
            margin-bottom: 30px;
        }
        
        .menu-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            position: relative;
            padding-bottom: 10px;
        }
        
        .menu-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 80px;
            height: 3px;
            background-color: var(--primary-color);
        }
        
        .menu-links a {
            display: block;
            color: var(--text-color);
            text-decoration: none;
            padding: 10px 0;
            font-size: 1.1rem;
        }
        
        .hamburger {
            font-size: 1.8rem;
            cursor: pointer;
        }
        
        .success-message {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        @media (max-width: 600px) {
            header {
                padding: 15px;
            }
            
            .site-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="site-title">Paf-Links<span>.</span></h1>
        <div class="theme-toggle">
            <span>🌙</span>
        </div>
        <div class="hamburger">☰</div>
    </header>
    
    <div class="nav-menu">
        <div class="menu-section">
            <h2 class="menu-title">Liens utiles</h2>
            <div class="menu-links">
                <a href="#">À propos</a>
                <a href="#">Changer de thème</a>
                <a href="#" class="active">Signaler un lien mort</a>
            </div>
        </div>
        <div class="menu-section">
            <h2 class="menu-title">Conseil</h2>
            <div class="menu-links">
                <p>Utilisez <a href="#" style="color: var(--primary-color); display: inline;">uBlock Origin</a> pour bloquer les publicités lors de votre navigation.</p>
            </div>
        </div>
    </div>
    
    <main class="main-content">
        <div class="success-message" id="successMessage">
            Merci ! Le lien mort a été signalé avec succès.
        </div>
        
        <h1>Signaler un lien mort</h1>
        
        <div class="form-container">
            <form id="deadLinkForm">
                <div class="form-group">
                    <label for="site">Site concerné</label>
                    <select id="site" required>
                        <option value="">-- Sélectionner un site --</option>
                        <option value="cinepulse">Cinepulse</option>
                        <option value="ivdid">IVDID</option>
                        <option value="topstream">Topstream</option>
                        <option value="vfstream">VFStream</option>
                        <option value="autre">Autre (préciser)</option>
                    </select>
                </div>
                
                <div class="form-group" id="autreSiteGroup" style="display: none;">
                    <label for="autreSite">Nom du site</label>
                    <input type="text" id="autreSite" placeholder="Entrez le nom du site">
                </div>
                
                
                <div class="form-group">
                    <label for="description">Description du problème</label>
                    <textarea id="description" placeholder="Décrivez le problème rencontré (erreur 404, site inaccessible, contenu manquant...)" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="email">Votre email (facultatif)</label>
                    <input type="email" id="email" placeholder="Pour vous informer quand le problème sera résolu">
                </div>
                
                <button type="submit">Envoyer le signalement</button>
            </form>
        </div>
    </main>
    
    <script>
        // Toggle menu
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('menu-open');
        });
        
        // Show "Autre" field when "Autre" is selected
        const siteSelect = document.getElementById('site');
        const autreSiteGroup = document.getElementById('autreSiteGroup');
        
        siteSelect.addEventListener('change', () => {
            if (siteSelect.value === 'autre') {
                autreSiteGroup.style.display = 'block';
            } else {
                autreSiteGroup.style.display = 'none';
            }
        });
        
        // Form submission
        const deadLinkForm = document.getElementById('deadLinkForm');
        const successMessage = document.getElementById('successMessage');
        
        deadLinkForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // In a real implementation, you would send the form data to a server here
            
            // Show success message
            successMessage.style.display = 'block';
            
            // Reset form
            deadLinkForm.reset();
            autreSiteGroup.style.display = 'none';
            
            // Hide success message after 5 seconds
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
